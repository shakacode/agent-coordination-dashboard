version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 1
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25"
